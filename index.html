<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b263a" />
  <title>EdgeCheck</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-row">
        <img src="icon.png" alt="EdgeCheck" class="brand-logo" />
        <div class="app-title">
          <h1>EdgeCheck</h1>
          <p class="header-subtitle">Gateway Troubleshooting Console</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="backBtn" class="btn btn-secondary" type="button">Zurück</button>
        <button id="resetBtn" class="btn btn-primary" type="button">Diagnose neu starten</button>
      </div>
    </header>

    <nav class="progress-track" aria-label="Diagnosefortschritt">
      <span id="progressDevice" class="progress-step is-active">1 Gerät</span>
      <span id="progressProblem" class="progress-step">2 Problem</span>
      <span id="progressFlow" class="progress-step">3 Diagnose</span>
    </nav>

    <main id="appGrid" class="app-grid">
      <aside class="selection-column">
        <section id="gatewayPanel" class="panel compact">
          <h2>1 Gerät wählen</h2>
          <p class="stage-hint">Wähle das Gateway für den Störungseinsatz.</p>
          <div id="gatewayList" class="selection-list"></div>
        </section>

        <section id="problemPanel" class="panel compact">
          <h2>2 Problem wählen</h2>
          <p id="problemHint" class="stage-hint"></p>
          <div id="problemList" class="selection-list"></div>
        </section>
      </aside>

      <section id="contentPanel" class="panel content-panel" aria-live="polite">
        <div id="contentArea"></div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
