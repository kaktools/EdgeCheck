<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>EdgeCheck</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <img src="icon.png" alt="EdgeCheck Logo" class="brand-logo" />
        <div>
          <p class="kicker">Service-App</p>
          <h1>EdgeCheck</h1>
        </div>
      </div>
      <button id="resetBtn" class="btn btn-secondary" type="button">Diagnosepfad neu starten</button>
    </header>

    <nav class="progress" aria-label="Diagnosefortschritt">
      <span id="progressDevice" class="progress-step is-active">1 Gerät</span>
      <span id="progressProblem" class="progress-step">2 Problem</span>
      <span id="progressFlow" class="progress-step">3 Diagnose</span>
    </nav>

    <main class="shell">
      <aside class="picker">
        <section class="panel">
          <h2>Gateway</h2>
          <div id="gatewayList" class="list"></div>
        </section>

        <section class="panel">
          <h2>Problem</h2>
          <div id="problemList" class="list"></div>
        </section>

        <section class="panel panel-actions">
          <button id="backBtn" class="btn btn-ghost" type="button">Zurück zu Gateway</button>
          <button id="clearChecksBtn" class="btn btn-ghost" type="button">Checkliste leeren</button>
        </section>
      </aside>

      <section class="workspace panel" id="contentArea" aria-live="polite"></section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
